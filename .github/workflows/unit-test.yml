name: unit-test
on:
  push:
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: setup rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Run unit tests
        run: lune run tests/reactive-test/tests.luau
